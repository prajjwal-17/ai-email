services:
  - type: web
    name: phishguard-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: HUGGING_FACE_SPACE_ID
        value: prajjwal1711/email-phishing-detector
      - key: HUGGING_FACE_API_TOKEN
        sync: false
