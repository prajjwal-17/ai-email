<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhishGuard — AI Email Threat Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0c0f;
      --surface: #111418;
      --surface2: #181c22;
      --border: #232830;
      --accent: #00e5a0;
      --accent2: #ff4f64;
      --warn: #ffb830;
      --text: #e8edf5;
      --muted: #5a6478;
      --safe: #00e5a0;
      --danger: #ff4f64;
      --medium: #ffb830;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--accent); }
    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    /* Main */
    main { flex: 1; padding: 40px 0 60px; }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    h1 em { color: var(--accent); font-style: normal; }
    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 36px;
      font-family: 'Space Mono', monospace;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Form fields */
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px;
    }
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }
    textarea { min-height: 180px; line-height: 1.6; }

    /* Analyze Button */
    .btn-analyze {
      width: 100%;
      background: var(--accent);
      color: #0a0c0f;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-analyze:hover { opacity: 0.88; }
    .btn-analyze:active { transform: scale(0.98); }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(10,12,15,0.3);
      border-top-color: #0a0c0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    #result { display: none; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .verdict-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .verdict-icon {
      width: 56px; height: 56px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .verdict-icon.safe    { background: rgba(0,229,160,0.12); }
    .verdict-icon.danger  { background: rgba(255,79,100,0.12); }
    .verdict-icon.medium  { background: rgba(255,184,48,0.12); }

    .verdict-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .verdict-title.safe   { color: var(--safe); }
    .verdict-title.danger { color: var(--danger); }
    .verdict-title.medium { color: var(--medium); }
    .verdict-sub { font-size: 13px; color: var(--muted); margin-top: 3px; font-family: 'Space Mono', monospace; }

    /* Score meter */
    .score-section { margin-bottom: 24px; }
    .score-label {
      display: flex; justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .score-value { font-weight: 700; }
    .score-value.safe   { color: var(--safe); }
    .score-value.danger { color: var(--danger); }
    .score-value.medium { color: var(--medium); }

    .meter-track {
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .meter-fill.safe   { background: var(--safe); }
    .meter-fill.danger { background: var(--danger); }
    .meter-fill.medium { background: var(--medium); }

    /* Flags */
    .flags-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .flags-list { display: flex; flex-direction: column; gap: 8px; }
    .flag-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px;
      border-left: 3px solid transparent;
      font-size: 14px;
      line-height: 1.5;
    }
    .flag-item.high   { border-color: var(--danger); }
    .flag-item.medium { border-color: var(--medium); }
    .flag-item.low    { border-color: var(--safe); }
    .flag-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }
    .flag-dot.high   { background: var(--danger); }
    .flag-dot.medium { background: var(--medium); }
    .flag-dot.low    { background: var(--safe); }

    /* Summary */
    .summary-box {
      background: var(--surface2);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      margin-top: 18px;
      border: 1px solid var(--border);
    }
    .summary-box strong { color: var(--accent); }

    /* Error */
    .error-box {
      background: rgba(255,79,100,0.08);
      border: 1px solid rgba(255,79,100,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      color: var(--danger);
      font-family: 'Space Mono', monospace;
      display: none;
      margin-top: 16px;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 0;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    footer span { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🛡</div>
        <div class="logo-text">Phish<span>Guard</span></div>
      </div>
      <div class="badge">AI POWERED</div>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <h1>Detect <em>Phishing</em><br/>Before It's Too Late</h1>
    <p class="subtitle">// paste an email → get an instant threat analysis</p>

    <div class="card">
      <div class="card-label">// Email Input</div>

      <div class="field">
        <label>SENDER ADDRESS</label>
        <input type="text" id="sender" placeholder="e.g. support@paypa1-secure.com" />
      </div>

      <div class="field">
        <label>SUBJECT LINE</label>
        <input type="text" id="subject" placeholder="e.g. Urgent: Your account has been compromised" />
      </div>

      <div class="field">
        <label>EMAIL BODY</label>
        <textarea id="body" placeholder="Paste the full email content here..."></textarea>
      </div>

      <button class="btn-analyze" id="analyzeBtn" onclick="analyzeEmail()">
        <span id="btnText">⚡ Analyze Email</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="error-box" id="errorBox"></div>
    </div>

    <!-- Result Card -->
    <div class="card" id="result">
      <div class="card-label">// Threat Analysis Report</div>

      <div class="verdict-bar">
        <div class="verdict-icon" id="verdictIcon"></div>
        <div>
          <div class="verdict-title" id="verdictTitle"></div>
          <div class="verdict-sub" id="verdictSub"></div>
        </div>
      </div>

      <div class="score-section">
        <div class="score-label">
          <span>PHISHING RISK SCORE</span>
          <span class="score-value" id="scoreValue"></span>
        </div>
        <div class="meter-track">
          <div class="meter-fill" id="meterFill"></div>
        </div>
      </div>

      <div class="flags-title">// Detected Indicators</div>
      <div class="flags-list" id="flagsList"></div>

      <div class="summary-box" id="summaryBox"></div>
    </div>

  </div>
</main>

<footer>
  <div class="container">
    Powered by <span>Claude claude-sonnet-4-20250514</span> · PhishGuard v1.0
  </div>
</footer>

<script>
  async function analyzeEmail() {
    const sender = document.getElementById('sender').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const body = document.getElementById('body').value.trim();
    const errorBox = document.getElementById('errorBox');
    const result = document.getElementById('result');

    errorBox.style.display = 'none';
    result.style.display = 'none';

    if (!body) {
      errorBox.textContent = 'ERROR: Email body is required for analysis.';
      errorBox.style.display = 'block';
      return;
    }

    setLoading(true);

    const prompt = `You are an expert cybersecurity analyst specializing in phishing email detection.

Analyze this email and return a JSON object (no markdown, no extra text) with EXACTLY this structure:
{
  "risk_score": <integer 0-100>,
  "verdict": "<SAFE | SUSPICIOUS | PHISHING>",
  "verdict_reason": "<one short sentence>",
  "indicators": [
    { "severity": "<high|medium|low>", "text": "<description of the indicator>" }
  ],
  "summary": "<2-3 sentence plain-language summary for a non-technical user>"
}

Email to analyze:
SENDER: ${sender || '(not provided)'}
SUBJECT: ${subject || '(not provided)'}
BODY:
${body}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error.message || 'API error');

      const rawText = data.content.map(b => b.text || '').join('');
      const clean = rawText.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      renderResult(parsed);

    } catch (err) {
      errorBox.textContent = 'ERROR: ' + (err.message || 'Failed to analyze. Please try again.');
      errorBox.style.display = 'block';
    } finally {
      setLoading(false);
    }
  }

  function renderResult(data) {
    const score = Math.min(100, Math.max(0, data.risk_score || 0));
    const verdict = (data.verdict || 'SUSPICIOUS').toUpperCase();

    let cls, icon, title;
    if (verdict === 'SAFE' || score < 35) {
      cls = 'safe'; icon = '✅'; title = 'Safe Email';
    } else if (verdict === 'PHISHING' || score >= 70) {
      cls = 'danger'; icon = '🚨'; title = 'Phishing Detected';
    } else {
      cls = 'medium'; icon = '⚠️'; title = 'Suspicious Email';
    }

    document.getElementById('verdictIcon').className = `verdict-icon ${cls}`;
    document.getElementById('verdictIcon').textContent = icon;
    document.getElementById('verdictTitle').className = `verdict-title ${cls}`;
    document.getElementById('verdictTitle').textContent = title;
    document.getElementById('verdictSub').textContent = data.verdict_reason || '';

    const scoreEl = document.getElementById('scoreValue');
    scoreEl.textContent = score + ' / 100';
    scoreEl.className = `score-value ${cls}`;

    const fill = document.getElementById('meterFill');
    fill.className = `meter-fill ${cls}`;
    setTimeout(() => fill.style.width = score + '%', 50);

    const flagsList = document.getElementById('flagsList');
    flagsList.innerHTML = '';
    const indicators = data.indicators || [];
    if (indicators.length === 0) {
      flagsList.innerHTML = '<div class="flag-item low"><div class="flag-dot low"></div>No significant threat indicators detected.</div>';
    } else {
      indicators.forEach(ind => {
        const sev = (ind.severity || 'low').toLowerCase();
        flagsList.innerHTML += `
          <div class="flag-item ${sev}">
            <div class="flag-dot ${sev}"></div>
            <span>${ind.text}</span>
          </div>`;
      });
    }

    document.getElementById('summaryBox').innerHTML = `<strong>Summary:</strong> ${data.summary || 'Analysis complete.'}`;

    const result = document.getElementById('result');
    result.style.display = 'block';
    result.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function setLoading(on) {
    const btn = document.getElementById('analyzeBtn');
    const txt = document.getElementById('btnText');
    const spin = document.getElementById('spinner');
    btn.disabled = on;
    txt.textContent = on ? 'Analyzing...' : '⚡ Analyze Email';
    spin.style.display = on ? 'block' : 'none';
  }
</script>
</body>
</html>
